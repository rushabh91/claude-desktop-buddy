[platformio]
default_envs = m5stack-fire

[env:m5stickc-plus]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
build_src_filter = +<*> +<buddies/> -<psram_memtest.cpp>
lib_deps =
    m5stack/M5StickCPlus
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

; M5Stack Fire port. Uses M5Unified (supports the Fire natively) instead of
; the M5StickCPlus library. A compat shim at include/M5StickCPlus.h maps the
; old API onto M5Unified so the existing source compiles with minimal edits.
[env:m5stack-fire]
platform = espressif32
board = m5stack-fire
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_16mb_no_ota.csv
; Cap CPU at 80 MHz for battery: APB clock stays 80 MHz so LED (RMT), I2S audio
; and display SPI timing are unchanged; only the CPU core draws ~50-60% less.
; 80 MHz is the safe floor for stable BLE. (240 MHz is the default otherwise.)
board_build.f_cpu = 80000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
build_src_filter = +<*> +<buddies/> -<psram_memtest.cpp>
lib_deps =
    m5stack/M5Unified
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    fastled/FastLED @ ^3.6.0

; PSRAM diagnostic — isolated build (only psram_memtest.cpp + BLE).
;   pio run -e psram-memtest -t upload
[env:psram-memtest]
platform = espressif32
board = m5stack-fire
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
build_src_filter = -<*> +<psram_memtest.cpp> +<ble_bridge.cpp>
lib_deps =
    m5stack/M5Unified
